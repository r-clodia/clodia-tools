# Gateway clodia-tools — config pristine (clonabile).
# agents: solo clodia (ophelia quando si cabla codex→gateway). mcp_backends: vuoto
# (l'owner aggiunge i server via Add-MCP). Default tool: email+fs+agent (no Trello).
workspace_root: /Users/erreclaudea/erre-claudia
mcp_backends: []
agents:
  clodia:
    allowed_paths:
    - .
    allowed_shell_cmds: []
    denied_shell_patterns: []
    allowed_tools:
    - email.send
    - email.folders
    - email.list
    - email.read
    - email.search
    - email.reply
    - fs.list_dir
    - topic.*
    - runtime.*
  ophelia:
    allowed_paths:
    - .
    allowed_shell_cmds: []
    denied_shell_patterns: []
    allowed_tools:
    - email.send
    - email.folders
    - email.list
    - email.read
    - email.search
    - email.reply
    - fs.list_dir
    - topic.*
    - runtime.*
  # Wainston (agent di sistema, normal): helpdesk widget + amministrazione delle
  # capability degli ALTRI agent editabili. Non super → la whitelist è esplicita.
  wainston:
    allowed_paths:
    - .
    allowed_shell_cmds: []
    denied_shell_patterns: []
    allowed_tools:
    - agents.*
    - runtime.*
    - app_runtime.*
  # Mercuria (agent di sistema, normal): agente MESSAGGERO — email + Telegram.
  # Non super → whitelist esplicita. La fruizione degli account email e del bot
  # Telegram resta gated dai grant del VAULT (delega per-agent): la whitelist apre
  # i namespace, i grant scelgono quali account/token.
  mercuria:
    allowed_paths:
    - .
    allowed_shell_cmds: []
    denied_shell_patterns: []
    allowed_tools:
    - email.send
    - email.folders
    - email.list
    - email.read
    - email.search
    - email.reply
    - telegram.*
    - fs.list_dir
  # Impiegato Tomato (agent di dominio, normal): back-office virtuale Tomato Srl.
  # Accede a email (info@tomato.blue) e Google Drive Tomato.
  # Il grant vault per la credenziale google_info_tomato_blue va assegnato
  # a runtime: webui → Tools → Integrations → Edit grant, oppure:
  #   python3 -m server.colony.vault set-grant <cred> impiegato-tomato fetch
  impiegato-tomato:
    allowed_paths:
    - .
    allowed_shell_cmds: []
    denied_shell_patterns: []
    allowed_tools:
    - email.send
    - email.folders
    - email.list
    - email.read
    - email.search
    - email.reply
    - email.get_attachment
    - email.save_attachment
    - gdrive.*
    - fs.list_dir
    - topic.*
    - runtime.*
  # NB: i responder confinati dei canali (eco-<topic>) sono CLONI per-topic
  # registrati a RUNTIME dal backend (channel_responder → /internal/agents/whitelist),
  # non qui: sono istanza-specifici. Il backend li ri-registra a ogni tick, così
  # sopravvivono ai rebuild del gateway (config.yaml baked nell'immagine).
