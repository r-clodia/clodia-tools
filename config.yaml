# Gateway clodia-tools — config pristine (clonabile).
# agents: solo clodia (ophelia quando si cabla codex→gateway). mcp_backends: vuoto
# (l'owner aggiunge i server via Add-MCP). Default tool: email+fs+agent (no Trello).
workspace_root: /Users/erreclaudea/erre-claudia
mcp_backends: []
agents:
  clodia:
    allowed_paths:
    - .
    allowed_shell_cmds: []
    denied_shell_patterns: []
    allowed_tools:
    - email.send
    - email.folders
    - email.list
    - email.read
    - email.search
    - email.reply
    - fs.list_dir
    - topic.*
    - runtime.*
  ophelia:
    allowed_paths:
    - .
    allowed_shell_cmds: []
    denied_shell_patterns: []
    allowed_tools:
    - email.send
    - email.folders
    - email.list
    - email.read
    - email.search
    - email.reply
    - fs.list_dir
    - topic.*
    - runtime.*
  # Wainston (agent di sistema, normal): helpdesk widget + amministrazione delle
  # capability degli ALTRI agent editabili. Non super → la whitelist è esplicita.
  wainston:
    allowed_paths:
    - .
    allowed_shell_cmds: []
    denied_shell_patterns: []
    allowed_tools:
    - agents.*
    - runtime.*
    - app_runtime.*
  # Hermes: responder confinato del canale Telegram (privacy shield). Nessun tool
  # (risponde solo in chat, il contesto arriva nel prompt) → allowed_tools vuoto.
  # Presente in config.yaml solo per poter aprire la sessione MCP (agent_name).
  hermes:
    allowed_paths:
    - .
    allowed_shell_cmds: []
    denied_shell_patterns: []
    allowed_tools: []
